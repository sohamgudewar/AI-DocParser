services:

  app:
    build: .
    container_name: krishinetra-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: krishinetra-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4
    container_name: krishinetra-db
    environment:
      POSTGRES_DB: krishinetra
      POSTGRES_USER: krishinetra
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krishinetra"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build: .
    container_name: krishinetra-worker
    command: celery -A modules.tasks worker --loglevel=info --concurrency=2
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
